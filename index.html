<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Hóa Học – Oxi hóa – Khử & Tốc độ Phản ứng</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"
    onload="document.addEventListener('DOMContentLoaded', () => renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}))"></script>
  <style>
    :root {
      --bg: #0a0e17; --surface: #111827; --surface2: #151f30; --border: #1f2d45;
      --accent: #4f8ef7; --accent2: #7ab3ff; --gold: #4f8ef7; --gold2: #7ab3ff;
      --red: #f85149; --green: #3fb950; --text: #e2e8f0; --muted: #94a3b8; --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(79,142,247,0.1) 0%, rgba(79,142,247,0.03) 40%, transparent 70%); border-radius: 50%; z-index: 0; pointer-events: none; transform: translate(-50%,-50%); left: 50%; top: 50%; transition: left 0.08s ease, top 0.08s ease; }
    .screen { display: none; width: 100%; max-width: 920px; padding: 24px 16px 60px; position: relative; z-index: 1; }
    .screen.active { display: block; }
    #start-screen { text-align: center; padding-top: 60px; }
    .logo-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.4); border-radius: 999px; padding: 6px 16px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; color: var(--accent2); text-transform: uppercase; margin-bottom: 28px; animation: fadeDown 0.8s ease both; }
    h1.main-title { font-family: 'Libre Baskerville', serif; font-size: clamp(2rem,5vw,3.4rem); font-weight: 900; line-height: 1.15; background: linear-gradient(135deg,#fff 0%,var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; animation: fadeDown 0.9s 0.1s ease both; }
    .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 36px; animation: fadeDown 1s 0.2s ease both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .stats-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 22px; text-align: center; min-width: 110px; transition: border-color 0.3s; }
    .stat-card:hover { border-color: rgba(79,142,247,0.4); }
    .stat-card .num { font-family: 'Libre Baskerville', serif; font-size: 1.9rem; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 0.73rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-start { background: linear-gradient(135deg,#4f8ef7,#7ab3ff); color: #0a0e17; border: none; border-radius: var(--radius); padding: 16px 48px; font-size: 1.05rem; font-weight: 700; font-family: 'DM Sans',sans-serif; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; animation: fadeDown 1s 0.3s ease both; margin-top: 10px; }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,0.4); }
    #quiz-screen { padding-top: 20px; }
    .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
    .mode-badge { background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.3); border-radius: 999px; padding: 5px 14px; font-size: 0.72rem; font-weight: 700; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; }
    .q-counter { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .q-counter span { color: var(--text); font-weight: 700; }
    .progress-bar-wrap { width: 100%; height: 5px; background: var(--border); border-radius: 999px; margin-bottom: 24px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#4f8ef7,#7ab3ff); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .segment-progress { display: flex; gap: 3px; margin-bottom: 20px; flex-wrap: wrap; }
    .seg-dot { flex: 1; min-width: 3px; max-width: 10px; height: 5px; border-radius: 999px; background: var(--border); transition: background 0.3s; }
    .seg-dot.correct { background: var(--green); }
    .seg-dot.wrong { background: var(--red); }
    .seg-dot.current { background: var(--accent); }
    .quiz-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; align-items: start; }
    .quiz-layout.no-passage { grid-template-columns: 1fr; }
    .passage-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; padding: 20px; max-height: 520px; overflow-y: auto; font-size: 0.87rem; line-height: 1.75; color: #cbd5e1; position: sticky; top: 16px; }
    .passage-panel::-webkit-scrollbar { width: 5px; }
    .passage-panel::-webkit-scrollbar-track { background: transparent; }
    .passage-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    .passage-panel h4 { font-size: 0.75rem; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .passage-panel h4::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .passage-panel img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 26px; animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .q-label { font-size: 0.7rem; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .q-text { font-size: 1rem; font-weight: 600; line-height: 1.65; margin-bottom: 18px; }
    .q-img { max-width: 100%; border-radius: 10px; margin-bottom: 14px; display: block; }
    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; text-align: left; cursor: pointer; transition: all 0.18s; font-size: 0.9rem; font-family: 'DM Sans',sans-serif; color: var(--text); font-weight: 500; line-height: 1.5; display: flex; align-items: flex-start; gap: 11px; }
    .option-btn:hover:not(:disabled) { border-color: rgba(79,142,247,0.5); background: rgba(79,142,247,0.08); transform: translateX(3px); }
    .option-btn .opt-label { width: 24px; height: 24px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.73rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; transition: all 0.18s; }
    .option-btn:hover:not(:disabled) .opt-label { background: var(--accent); color: #0a0e17; }
    .option-btn.correct { border-color: var(--green); background: rgba(63,185,80,0.1); pointer-events: none; }
    .option-btn.correct .opt-label { background: var(--green); color: #0a0e17; }
    .option-btn.wrong { border-color: var(--red); background: rgba(248,81,73,0.1); pointer-events: none; }
    .option-btn.wrong .opt-label { background: var(--red); color: #fff; }
    .option-btn.disabled-plain { opacity: 0.5; pointer-events: none; }
    .option-img { max-width: 100%; max-height: 120px; border-radius: 8px; display: block; margin-top: 6px; }
    .feedback-box { border-radius: var(--radius); padding: 13px 17px; font-size: 0.87rem; font-weight: 600; margin-bottom: 14px; display: none; align-items: flex-start; gap: 10px; line-height: 1.5; }
    .feedback-box.show { display: flex; }
    .feedback-box.correct-fb { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: #7ee787; }
    .feedback-box.wrong-fb { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: #ff7b72; }
    .feedback-explanation { margin-top: 6px; font-size: 0.82rem; font-weight: 400; opacity: 0.9; line-height: 1.6; }
    .btn-next { background: linear-gradient(135deg,#4f8ef7,#7ab3ff); color: #0a0e17; border: none; border-radius: var(--radius); padding: 14px 36px; font-size: 0.95rem; font-weight: 700; font-family: 'DM Sans',sans-serif; cursor: pointer; transition: all 0.2s; display: none; width: 100%; }
    .btn-next.show { display: block; }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
    #result-screen { text-align: center; padding-top: 40px; }
    .result-ring-wrap { display: flex; justify-content: center; margin-bottom: 26px; }
    .result-ring { width: 160px; height: 160px; position: relative; }
    .result-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
    .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-pct { font-family: 'Libre Baskerville', serif; font-size: 2.2rem; font-weight: 900; }
    .ring-lbl { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    .result-title { font-family: 'Libre Baskerville', serif; font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
    .result-sub { color: var(--muted); margin-bottom: 30px; }
    .result-stats { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
    .res-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 18px; min-width: 95px; }
    .res-stat .rs-num { font-family: 'Libre Baskerville', serif; font-size: 1.8rem; font-weight: 700; }
    .res-stat .rs-lbl { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .res-stat.green .rs-num { color: var(--green); }
    .res-stat.red .rs-num { color: var(--red); }
    .res-stat.blue .rs-num { color: var(--accent); }
    .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-restart, .btn-back { border-radius: var(--radius); padding: 13px 26px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans',sans-serif; transition: all 0.2s; border: none; }
    .btn-restart { background: linear-gradient(135deg,#4f8ef7,#7ab3ff); color: #0a0e17; }
    .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,142,247,0.35); }
    .btn-back { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-back:hover { border-color: var(--accent); color: var(--accent2); }
    .review-section { margin-top: 36px; text-align: left; }
    .review-title { font-family: 'Libre Baskerville', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 14px; color: var(--accent2); }
    .review-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 10px; }
    .review-item .ri-q { font-size: 0.87rem; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
    .review-item .ri-row { font-size: 0.8rem; margin-top: 4px; line-height: 1.5; }
    .ri-wrong-ans { color: var(--red); }
    .ri-right-ans { color: var(--green); }
    @media (max-width: 700px) {
      .quiz-layout { display: flex; flex-direction: column; gap: 10px; }
      .passage-panel { position: static; max-height: 260px; overflow-y: auto; padding: 14px 16px; }
      .question-card { padding: 18px 14px; }
      .q-text { font-size: 0.93rem; }
      .option-btn { font-size: 0.85rem; padding: 11px 13px; }
      .screen { padding: 16px 12px 60px; }
    }
  </style>
</head>
<body>
<div class="glow" id="glow"></div>

<!-- START SCREEN -->
<div class="screen active" id="start-screen">
  <div class="logo-badge">⚗️ Hóa Học 10 – THPT</div>
  <h1 class="main-title">Quiz Hóa Học 10</h1>
  <p class="subtitle">Oxi hóa – Khử · Tốc độ Phản ứng · 30 câu trắc nghiệm</p>
  <div class="stats-row">
    <div class="stat-card"><div class="num">144</div><div class="lbl">Câu hỏi</div></div>
    <div class="stat-card"><div class="num">4</div><div class="lbl">Đáp án/câu</div></div>
    <div class="stat-card"><div class="num">∞</div><div class="lbl">Thời gian</div></div>
  </div>
  <button class="btn-start" id="btn-start">🚀 Bắt đầu làm bài</button>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quiz-screen">
  <div class="quiz-header">
    <div class="mode-badge" id="cur-mode-badge">Trắc nghiệm</div>
    <div class="q-counter">Câu <span id="q-cur">1</span> / <span id="q-total">30</span></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
  <div class="segment-progress" id="seg-progress"></div>
  <div class="quiz-layout no-passage" id="quiz-layout">
    <div class="passage-panel" id="passage-panel" style="display:none">
      <div id="passage-text"></div>
    </div>
    <div class="question-card">
      <div class="q-label" id="q-label">Câu 1</div>
      <div class="q-text" id="q-text"></div>
      <div id="q-content"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <button class="btn-next" id="btn-next">Câu tiếp theo →</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="result-screen">
  <div class="result-ring-wrap">
    <div class="result-ring">
      <svg viewBox="0 0 150 150">
        <circle class="ring-bg" cx="75" cy="75" r="65"/>
        <circle class="ring-fill" id="ring-fill" cx="75" cy="75" r="65"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-lbl">Điểm</div>
      </div>
    </div>
  </div>
  <div class="result-title" id="result-title">Hoàn thành!</div>
  <div class="result-sub" id="result-sub"></div>
  <div class="result-stats">
    <div class="res-stat green"><div class="rs-num" id="rs-correct">0</div><div class="rs-lbl">Đúng</div></div>
    <div class="res-stat red"><div class="rs-num" id="rs-wrong">0</div><div class="rs-lbl">Sai</div></div>
    <div class="res-stat blue"><div class="rs-num" id="rs-total">0</div><div class="rs-lbl">Tổng</div></div>
  </div>
  <div class="result-btns">
    <button class="btn-restart" onclick="startQuiz()">🔄 Làm lại</button>
    <button class="btn-back" onclick="showScreen('start-screen')">← Trang chủ</button>
  </div>
  <div class="review-section">
    <div class="review-title">📋 Xem lại câu sai</div>
    <div id="review-list"></div>
  </div>
</div>

<script>
const LABELS = ['A','B','C','D'];
let questions = [];
let qIdx = 0;
let answers = [];

const questionsData = [
  {
    id:'q1', label:'Câu 1',
    question:'Số oxi hóa là một số đại số đặc trưng cho đại lượng nào sau đây của nguyên tử trong phân tử?',
    options:['Hóa trị.','Điện tích.','Khối lượng.','Số hiệu nguyên tử.'],
    correct:1,
    explanation:'Số oxi hóa đặc trưng cho điện tích của nguyên tử trong phân tử (điện tích quy ước nếu liên kết là ion hoàn toàn).'
  },
  {
    id:'q2', label:'Câu 2',
    question:'Phản ứng oxi hóa – khử là phản ứng có sự nhường và nhận',
    options:['Electron.','Neutron.','Proton.','Cation.'],
    correct:0,
    explanation:'Phản ứng oxi hóa – khử đặc trưng bởi sự chuyển dịch electron giữa các chất.'
  },
  {
    id:'q3', label:'Câu 3',
    question:'Dấu hiệu để nhận ra một phản ứng oxi hóa – khử là dựa trên sự thay đổi đại lượng nào sau đây của nguyên tử?',
    options:['Số khối.','Số oxi hóa.','Số hiệu nguyên tử.','Số mol.'],
    correct:1,
    explanation:'Khi số oxi hóa của nguyên tử thay đổi thì đó là phản ứng oxi hóa – khử.'
  },
  {
    id:'q4', label:'Câu 4',
    question:'Trong phản ứng oxi hóa – khử, chất oxi hóa là chất',
    options:['nhường electron.','nhận electron.','nhận proton.','nhường proton.'],
    correct:1,
    explanation:'Chất oxi hóa là chất nhận electron (bị khử), còn chất khử là chất nhường electron (bị oxi hóa).'
  },
  {
    id:'q5', label:'Câu 5',
    question:'Trong phản ứng oxi hóa – khử, chất nhường electron được gọi là',
    options:['chất khử.','chất oxi hóa.','acid.','base.'],
    correct:0,
    explanation:'Chất khử là chất nhường electron (bị oxi hóa – số oxi hóa tăng).'
  },
  {
    id:'q6', label:'Câu 6',
    question:'Fe₂O₃ là thành phần chính của quặng hematite đỏ, dùng để luyện gang. Số oxi hóa của iron (sắt) trong Fe₂O₃ là',
    options:['+3.','3+.','3.','-3.'],
    correct:0,
    explanation:'Trong Fe₂O₃: 2x + 3(−2) = 0 → x = +3. Số oxi hóa viết theo quy ước dấu trước số: +3.'
  },
  {
    id:'q7', label:'Câu 7',
    question:'Ammonia (NH₃) là nguyên liệu để sản xuất nitric acid và nhiều loại phân bón. Số oxi hóa của nitrogen trong ammonia là',
    options:['3.','0.','+3.','-3.'],
    correct:3,
    explanation:'Trong NH₃: x + 3(+1) = 0 → x = −3. Nitrogen có số oxi hóa −3.'
  },
  {
    id:'q8', label:'Câu 8',
    question:'Chromium có số oxi hóa +2 trong hợp chất nào sau đây?',
    options:['Cr(OH)₃.','Na₂CrO₄.','CrCl₂.','Cr₂O₃.'],
    correct:2,
    explanation:'CrCl₂: x + 2(−1) = 0 → x = +2. Các chất còn lại: Cr(OH)₃ có Cr(+3), Na₂CrO₄ có Cr(+6), Cr₂O₃ có Cr(+3).'
  },
  {
    id:'q9', label:'Câu 9',
    question:'Dẫn khí H₂ đi qua ống sứ đựng bột CuO nung nóng: $CuO + H_2 \\xrightarrow{t^0} Cu + H_2O$. Trong phản ứng trên, chất đóng vai trò chất khử là',
    options:['CuO.','Cu.','H₂.','H₂O.'],
    correct:2,
    explanation:'H₂ nhường electron (H: 0 → +1), bị oxi hóa nên là chất khử. CuO là chất oxi hóa (Cu: +2 → 0).'
  },
  {
    id:'q10', label:'Câu 10',
    question:'Thuốc tím chứa ion permanganate ($MnO_4^-$) có tính oxi hóa mạnh. Số oxi hóa của manganese trong ion permanganate là',
    options:['+2.','+3.','+7.','+6.'],
    correct:2,
    explanation:'Trong MnO₄⁻: x + 4(−2) = −1 → x = +7.'
  },
  {
    id:'q11', label:'Câu 11',
    question:'Trong phân tử NH₄NO₃ thì số oxi hóa của 2 nguyên tử N là',
    options:['+1 và +1.','–4 và +6.','–3 và +5.','–3 và +6.'],
    correct:2,
    explanation:'NH₄⁺: N có số oxi hóa −3 (x + 4 = +1). NO₃⁻: N có số oxi hóa +5 (x − 6 = −1). Vậy là −3 và +5.'
  },
  {
    id:'q12', label:'Câu 12',
    question:'Tổng hệ số của các chất trong phản ứng: Fe₃O₄ + HNO₃ → Fe(NO₃)₃ + NO + H₂O là',

// ── RUNTIME ──
window.addEventListener('DOMContentLoaded', () => {
  questions = [...questionsData];
  document.getElementById('btn-start').addEventListener('click', startQuiz);
  document.getElementById('btn-next').addEventListener('click', nextQuestion);
  document.addEventListener('mousemove', e => {
    const g = document.getElementById('glow');
    g.style.left = e.clientX + 'px';
    g.style.top = e.clientY + 'px';
  });
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  questions = [...questionsData];
  qIdx = 0; answers = [];
  showScreen('quiz-screen');
  document.getElementById('cur-mode-badge').textContent = 'Trắc nghiệm – 30 câu';
  document.getElementById('q-total').textContent = questions.length;
  buildSegProgress();
  renderQuestion();
}

function buildSegProgress() {
  const el = document.getElementById('seg-progress');
  el.innerHTML = '';
  const total = questions.length;
  const maxW = Math.max(3, Math.min(14, Math.floor(860 / total) - 3));
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'seg-dot' + (i === 0 ? ' current' : '');
    d.id = 'seg-' + i;
    d.style.maxWidth = maxW + 'px';
    el.appendChild(d);
  });
}

function updateSegProgress(idx, result) {
  const d = document.getElementById('seg-' + idx);
  if (d) { d.classList.remove('current'); d.classList.add(result ? 'correct' : 'wrong'); }
  const next = document.getElementById('seg-' + (idx + 1));
  if (next) next.classList.add('current');
}

function renderQuestion() {
  const q = questions[qIdx];
  const total = questions.length;
  document.getElementById('q-cur').textContent = qIdx + 1;
  document.getElementById('progress-bar').style.width = ((qIdx / total) * 100) + '%';
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';

  const layout = document.getElementById('quiz-layout');
  const passagePanel = document.getElementById('passage-panel');
  passagePanel.style.display = 'none';
  layout.classList.add('no-passage');

  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-text').innerHTML = q.question;

  const content = document.getElementById('q-content');
  content.innerHTML = '';
  renderMCQuestion(q, content);

  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('quiz-layout'), {
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

function renderMCQuestion(q, content) {
  const div = document.createElement('div');
  div.className = 'options';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectAnswer(q, i));
    div.appendChild(btn);
  });
  content.appendChild(div);
}

function selectAnswer(q, chosen) {
  const isCorrect = chosen === q.correct;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    if (i === q.correct) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('disabled-plain');
  });
  answers.push({ correct: isCorrect, given: LABELS[chosen], correctAnswer: LABELS[q.correct] + '. ' + q.options[q.correct], question: q.question, explanation: q.explanation || '' });
  updateSegProgress(qIdx, isCorrect);
  const fb = document.getElementById('feedback-box');
  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    fb.innerHTML = `<span>✅</span><div><b>Chính xác!</b><div class="feedback-explanation">💡 ${q.explanation || ''}</div></div>`;
  } else {
    fb.className = 'feedback-box wrong-fb show';
    fb.innerHTML = `<span>❌</span><div><b>Sai rồi!</b> Đáp án đúng: <b>${LABELS[q.correct]}. ${q.options[q.correct]}</b><div class="feedback-explanation">💡 ${q.explanation || ''}</div></div>`;
  }
  document.getElementById('btn-next').className = 'btn-next show';
  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('feedback-box'), {
      delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= questions.length) showResult(); else renderQuestion();
}

function showResult() {
  showScreen('result-screen');
  const correct = answers.filter(a => a.correct).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = total - correct;
  document.getElementById('rs-total').textContent = total;
  document.getElementById('ring-pct').textContent = pct + '%';
  const circumference = 2 * Math.PI * 65;
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;
  setTimeout(() => {
    ring.style.strokeDashoffset = circumference * (1 - pct / 100);
    ring.style.stroke = pct >= 80 ? '#3fb950' : pct >= 60 ? '#f0883e' : '#f85149';
  }, 100);
  document.getElementById('ring-pct').style.color = pct >= 80 ? '#3fb950' : pct >= 60 ? '#f0883e' : '#f85149';
  const titles = pct === 100 ? ['🏆 Hoàn hảo!', 'Bạn đã trả lời đúng tất cả 30 câu!']
    : pct >= 80 ? ['🎉 Xuất sắc!', `Kết quả rất tốt: ${correct}/${total} câu đúng.`]
    : pct >= 60 ? ['👍 Khá tốt!', `Cần ôn thêm: ${correct}/${total} câu đúng.`]
    : ['📚 Cần cố gắng thêm!', `Hãy xem lại bài: ${correct}/${total} câu đúng.`];
  document.getElementById('result-title').textContent = titles[0];
  document.getElementById('result-sub').textContent = titles[1];
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  const wrongOnes = answers.filter(a => !a.correct);
  if (wrongOnes.length === 0) {
    reviewList.innerHTML = '<p style="color:var(--green);font-weight:600;">🎊 Không có câu nào sai!</p>';
  } else {
    wrongOnes.forEach(a => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<div class="ri-q">${a.question}</div>
        <div class="ri-row ri-wrong-ans">✗ Bạn chọn: ${a.given}</div>
        <div class="ri-row ri-right-ans">✓ Đáp án đúng: ${a.correctAnswer}</div>
        ${a.explanation ? `<div class="ri-row" style="color:var(--muted);font-size:0.78rem;">💡 ${a.explanation}</div>` : ''}`;
      reviewList.appendChild(div);
    });
  }
}
